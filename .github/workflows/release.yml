name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            target: x86_64-unknown-linux-gnu
            ext: ""
            needs_musl: false
          - os: ubuntu-latest
            asset_suffix: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
            ext: ""
            needs_musl: true
          - os: macos-13
            asset_suffix: macos-x86_64
            target: x86_64-apple-darwin
            ext: ""
            needs_musl: false
          - os: macos-14
            asset_suffix: macos-arm64
            target: aarch64-apple-darwin
            ext: ""
            needs_musl: false
          - os: windows-latest
            asset_suffix: windows-x86_64
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            needs_musl: false

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.needs_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nver${{ matrix.ext }} dist/nver-${{ matrix.asset_suffix }}${{ matrix.ext }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nver-${{ matrix.asset_suffix }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release with executables
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
